<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexMods | Admin Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff1e1e;
            --primary-glow: rgba(255, 30, 30, 0.4);
            --bg: #0a0a0c;
            --card-bg: #141417;
            --card-border: #222225;
            --text-main: #ffffff;
            --text-dim: #88888e;
            --success: #22c55e;
        }

        * {
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 2px 2px, #1a1a1a 1px, transparent 0);
            background-size: 40px 40px;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        header {
            margin-bottom: 40px;
            border-left: 4px solid var(--primary);
            padding-left: 20px;
        }

        h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            color: var(--primary);
            text-shadow: 0 0 15px var(--primary-glow);
        }

        .status-bar {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dot {
            height: 8px;
            width: 8px;
            background-color: var(--success);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px var(--success);
        }

        .user-list {
            display: grid;
            gap: 16px;
        }

        .user-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .user-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .user-card::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 3px;
            background: var(--primary);
            opacity: 0;
        }

        .user-card:hover::before {
            opacity: 1;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .avatar {
            width: 64px;
            height: 64px;
            border-radius: 12px;
            background-color: #222;
            border: 2px solid var(--card-border);
            object-fit: cover;
        }

        .user-card:hover .avatar {
            border-color: var(--primary);
        }

        .details .username {
            font-weight: 600;
            font-size: 1.1rem;
            display: block;
            margin-bottom: 2px;
        }

        .details .userid {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-dim);
            font-size: 0.8rem;
            background: #1d1d21;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--card-border);
            background: #1d1d21;
            color: var(--text-main);
            text-transform: uppercase;
        }

        .btn:hover {
            background: var(--primary);
            border-color: var(--primary);
            color: #000;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .btn-unban {
            color: var(--success);
        }

        .btn-unban:hover {
            background: var(--success);
            border-color: var(--success);
            color: #000;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.4);
        }

        .badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-dim);
            margin-left: 10px;
            vertical-align: middle;
        }

        .no-users {
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            text-align: center;
            padding: 30px;
            background: var(--card-bg);
            border: 1px dashed var(--card-border);
            border-radius: 12px;
        }

        @media (max-width: 600px) {
            .user-card {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }
            .actions {
                width: 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Logs de Ejecución</h1>
            <div class="status-bar">
                <span class="dot"></span> Sistema NexMods Activo • Operador: Admin
            </div>
        </header>
        
        <div class="user-list" id="lista-usuarios">
            <div class="no-users">Esperando conexiones desde el juego...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ==========================================
        // CONFIGURACIÓN DE FIREBASE
        // ==========================================
        const firebaseConfig = {
            databaseURL: "https://forcehub-8a4ba-default-rtdb.firebaseio.com/" 
        };

        // Inicializar la conexión
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const contenedorLista = document.getElementById('lista-usuarios');

        // ==========================================
        // LEER USUARIOS EN TIEMPO REAL
        // ==========================================
        const referenciasEjecucion = ref(db, 'ejecuciones/');
        onValue(referenciasEjecucion, (snapshot) => {
            contenedorLista.innerHTML = ""; // Limpiar estados anteriores
            
            const logs = snapshot.val();
            if (logs) {
                Object.keys(logs).forEach(idUsuario => {
                    const datosJugador = logs[idUsuario];
                    
                    // Crear estructura de tarjeta usando tus estilos css personalizados
                    const tarjeta = document.createElement('div');
                    tarjeta.className = 'user-card';
                    tarjeta.innerHTML = `
                        <div class="user-info">
                            <img class="avatar" src="${datosJugador.Foto}" alt="Avatar">
                            <div class="details">
                                <span class="username">${datosJugador.DisplayName} <span class="badge">@${datosJugador.Usuario}</span></span>
                                <span class="userid">ID: ${datosJugador.UserId}</span>
                            </div>
                        </div>
                        <div class="actions">
                            <button class="btn" onclick="mandarAccion('kick', '${datosJugador.UserId}')">Kick</button>
                            <button class="btn" onclick="mandarAccion('ban', '${datosJugador.UserId}')">Ban</button>
                            <button class="btn btn-unban" onclick="mandarAccion('unban', '${datosJugador.UserId}')">Unban</button>
                        </div>
                    `;
                    contenedorLista.appendChild(tarjeta);
                });
            } else {
                contenedorLista.innerHTML = '<div class="no-users">Ningún jugador está usando el script en este momento...</div>';
            }
        });

        // ==========================================
        // MANEJAR ACCIONES DE BOTONES (KICK, BAN, UNBAN)
        // ==========================================
        window.mandarAccion = function(tipo, id) {
            console.log(`%c[SISTEMA] Acción: ${tipo.toUpperCase()} enviada al ID: ${id}`, "color: #ff1e1e; font-weight: bold;");
            
            if (tipo === 'kick') {
                // Guarda la orden en la blacklist para el bucle de Roblox
                set(ref(db, 'blacklist/' + id), 'kick');
                // Lo borra de la lista visual para limpiar espacio
                remove(ref(db, 'ejecuciones/' + id));
            } 
            else if (tipo === 'ban') {
                // Bloqueo permanente en el nodo blacklist
                set(ref(db, 'blacklist/' + id), 'ban');
                remove(ref(db, 'ejecuciones/' + id));
            } 
            else if (tipo === 'unban') {
                // Quita la restricción de la blacklist
                remove(ref(db, 'blacklist/' + id));
                alert(`ID ${id} removido con éxito de la blacklist.`);
            }
        }
    </script>
</body>
</html>
